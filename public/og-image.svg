<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(0,150,199,0.14)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <line x1="0" y1="0" x2="1200" y2="0" stroke="#0096C7" stroke-width="3" opacity="0.6"/>

  <g transform="translate(80, 180)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1.5">
      <tspan x="0" dy="0">Your AI. Your machine.</tspan>
      <tspan x="0" dy="80" fill="#77c4ff">Cloud when you need it.</tspan>
    </text>
  </g>

  <g transform="translate(80, 380)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a1a1aa" letter-spacing="-0.3">
      <tspan x="0" dy="0">Local-first AI coding workspace. One model in RAM,</tspan>
      <tspan x="0" dy="36">zero model swapping. Cloud only when you need it.</tspan>
    </text>
  </g>

  <g transform="translate(80, 510)">
    <rect width="200" height="44" rx="22" fill="#0096C7" opacity="0.15" stroke="#0096C7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="100" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#77c4ff" text-anchor="middle" font-weight="600" letter-spacing="0.5">userada.dev</text>
  </g>

  <g transform="translate(80, 80)">
    <rect width="48" height="48" rx="14" fill="rgba(255,255,255,0.03)" stroke="#333" stroke-width="1"/>
    <text x="24" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#0096C7" text-anchor="middle" font-weight="800">R</text>
  </g>

  <g transform="translate(140, 80)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="white" y="32" letter-spacing="-0.4">Rada</text>
  </g>

  <g transform="translate(260, 87)">
    <rect width="120" height="28" rx="14" fill="rgba(0,150,199,0.08)" stroke="#0096C7" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="60" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#77c4ff" text-anchor="middle" font-weight="600" letter-spacing="1.5">PATENT PENDING</text>
  </g>
</svg>
